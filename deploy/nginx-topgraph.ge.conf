server {
    listen 80;
    listen [::]:80;
    server_name topgraph.ge www.topgraph.ge;

    root /var/www/topgraph.ge;
    index index.html;

    access_log /var/log/nginx/topgraph.ge.access.log;
    error_log /var/log/nginx/topgraph.ge.error.log;

    location = /index.html {
        return 301 /;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /en {
        return 301 /en/;
    }

    location = /en/index.html {
        return 301 /en/;
    }

    location /en/ {
        try_files $uri $uri/ /en/index.html;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
